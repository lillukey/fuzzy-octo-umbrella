<!DOCTYPE html>
<html>
<head>
    <title>Research Tool</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 60%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        iframe { width: 100%; height: 80vh; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <h1>Academic Search</h1>
    <input type="text" id="urlInput" placeholder="https://example.com">
    <button onclick="loadSite()">Go</button>

    <iframe id="viewer"></iframe>

    <script>
        // 1. Register the Service Worker (the brain of the proxy)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Proxy System: ACTIVE"))
                .catch(err => console.log("Proxy System: ERROR", err));
        }

        // 2. Function to load the site into the viewer
        function loadSite() {
            let url = document.getElementById('urlInput').value;
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            // The Service Worker will automatically intercept this request
            document.getElementById('viewer').src = url;
        }
    </script>
</body>
</html>
